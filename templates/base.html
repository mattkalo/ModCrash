<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ModCrash AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .alliance-bg {
            position: fixed;
            inset: 0;
            z-index: -10;
            background:
                radial-gradient(circle at 15% 15%, rgba(34,211,238,0.18), transparent 30%),
                radial-gradient(circle at 85% 20%, rgba(168,85,247,0.16), transparent 28%),
                radial-gradient(circle at 60% 90%, rgba(16,185,129,0.12), transparent 32%),
                #020617;
        }
        .alliance-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.08;
            background-image:
                linear-gradient(#fff 1px, transparent 1px),
                linear-gradient(90deg, #fff 1px, transparent 1px);
            background-size: 44px 44px;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">
<div class="alliance-bg"></div>

<nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="{{ url_for('landing') }}" class="font-bold text-cyan-300 text-xl">🌐 ModCrash Alliance</a>
        <div class="flex flex-wrap gap-4 text-sm">
            <a href="{{ url_for('landing') }}" class="text-slate-300 hover:text-white">首頁</a>
            <a href="{{ url_for('pricing') }}" class="text-slate-300 hover:text-white">方案</a>
            <a href="{{ url_for('database_page') }}" class="text-slate-300 hover:text-white">資料庫</a>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('analyzer') }}" class="text-cyan-300 hover:text-white">分析器</a>
                <a href="{{ url_for('dashboard') }}" class="text-slate-300 hover:text-white">儀表板</a>
                <a href="{{ url_for('logout') }}" class="text-slate-400 hover:text-white">登出</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="text-slate-300 hover:text-white">登入</a>
                <a href="{{ url_for('register') }}" class="bg-cyan-600 hover:bg-cyan-500 px-3 py-1 rounded-lg text-white">註冊</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-10">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for msg in messages %}
                    <div class="bg-yellow-950/50 border border-yellow-800 text-yellow-200 rounded-xl p-4">{{ msg }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>

</body>
</html>
