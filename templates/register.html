{% extends "base.html" %}
{% block title %}註冊｜ModCrash AI{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto glass border border-slate-800 rounded-3xl p-8">
    <h1 class="text-3xl font-bold text-white mb-6">建立帳號</h1>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm text-slate-300 mb-2">使用者名稱</label>
            <input name="username" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3" required>
        </div>
        <div>
            <label class="block text-sm text-slate-300 mb-2">Email</label>
            <input name="email" type="email" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3" required>
        </div>
        <div>
            <label class="block text-sm text-slate-300 mb-2">密碼</label>
            <input name="password" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3" required>
        </div>
        <div>
            <label class="block text-sm text-slate-300 mb-2">展示方案</label>
            <select name="plan" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3">
                {% for key, plan in plans.items() %}
                    <option value="{{ key }}">{{ plan.zh_name }} / {{ plan.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button class="w-full bg-cyan-600 hover:bg-cyan-500 px-6 py-3 rounded-xl font-bold text-white">註冊</button>
    </form>
</div>
{% endblock %}
