{% extends "base.html" %}
{% block title %}登入 - ModCrash AI{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-slate-900/85 border border-slate-800 rounded-2xl p-8">
    <h1 class="text-3xl font-bold text-white mb-6">登入</h1>
    <form method="POST" class="space-y-4">
        <input name="account" placeholder="使用者名稱或 Email" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3">
        <input name="password" type="password" placeholder="密碼" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3">
        <button class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold">登入</button>
    </form>
</div>
{% endblock %}
