{% extends "base.html" %}
{% block title %}公開資料庫 - ModCrash AI{% endblock %}
{% block content %}
<h1 class="text-4xl font-bold text-white mb-4">公開資料庫統計</h1>
<p class="text-slate-400 mb-6">可依遊戲查看目前累積的衝突規則與安全組合。</p>

<div class="bg-slate-900/85 border border-slate-800 rounded-2xl p-6 mb-6">
    <select id="gameSelect" class="bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200">
        {% for key, game in games.items() %}
        <option value="{{ key }}">{{ game.icon }} {{ game.label }}</option>
        {% endfor %}
    </select>
    <button onclick="loadStats()" class="bg-cyan-600 hover:bg-cyan-500 px-5 py-3 rounded-lg font-bold ml-2">查詢</button>
</div>

<div id="results" class="space-y-4"></div>

<script>
function escapeHtml(text) {
    return String(text ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
async function loadStats() {
    const game = document.getElementById("gameSelect").value;
    const box = document.getElementById("results");
    box.innerHTML = `<div class="bg-slate-900 border border-slate-800 rounded-xl p-5">載入中...</div>`;
    const res = await fetch(`/api/stats?game=${encodeURIComponent(game)}`);
    const data = await res.json();
    box.innerHTML = `
        <h2 class="text-2xl font-bold text-red-300">衝突資料庫</h2>
        ${data.conflict_rules.length ? data.conflict_rules.map(x => `
            <div class="bg-slate-900 border border-red-900 rounded-xl p-5">
                <h3 class="font-bold text-red-300">${escapeHtml(x.module_a)} + ${escapeHtml(x.module_b)}</h3>
                <p class="text-sm text-slate-400 mt-2">程度：${escapeHtml(x.conflict_degree)}｜類型：${escapeHtml(x.type)}｜回報：${x.report_count}｜來源：${escapeHtml(x.source)}</p>
                <p class="text-sm text-slate-500 mt-2">${escapeHtml(x.effect)}</p>
            </div>`).join("") : `<p class="text-slate-400">目前尚無衝突資料。</p>`}

        <h2 class="text-2xl font-bold text-emerald-300 mt-8">安全組合資料庫</h2>
        ${data.safe_combinations.length ? data.safe_combinations.map(x => `
            <div class="bg-slate-900 border border-emerald-900 rounded-xl p-5">
                <h3 class="font-bold text-emerald-300">${escapeHtml(x.module_a)} + ${escapeHtml(x.module_b)}</h3>
                <p class="text-sm text-slate-400 mt-2">回報：${x.report_count}｜信任：${x.confidence_score}｜來源：${escapeHtml(x.source)}</p>
            </div>`).join("") : `<p class="text-slate-400">目前尚無安全組合資料。</p>`}
    `;
}
loadStats();
</script>
{% endblock %}
